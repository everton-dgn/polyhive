npmRebuild: false
appId: sh.polyhive.desktop
productName: PolyHive
executableName: PolyHive
afterPack: ./scripts/after-pack.js
directories:
  output: release
files:
  - dist/**/*
asarUnpack:
  - dist/daemon/node-entrypoint-runner.js
extraResources:
  - from: ../app/dist
    to: app-dist
  - from: ../../skills
    to: skills
publish:
  provider: github
  owner: everton-dgn
  repo: polyhive
mac:
  artifactName: "PolyHive-${version}-${arch}.${ext}"
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  extraResources:
    - from: bin/polyhive
      to: bin/polyhive
  target:
    - dmg
    - zip
