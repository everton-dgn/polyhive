name: NPM Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Stable tag to publish (e.g. v0.1.60)'
        required: true
        type: string

concurrency:
  group: npm-publish-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-15
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Verify tag is stable
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$RELEASE_TAG' is not a stable release tag. Beta tags do not publish to npm."
            exit 1
          fi

      - name: Verify package version matches tag
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${RELEASE_TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "::error::Tag version '$TAG_VERSION' does not match package.json version '$PKG_VERSION'."
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Build publishable packages
        run: |
          npm run build --workspace=@everton-dgn/polyhive-highlight
          npm run build --workspace=@everton-dgn/polyhive-relay
          npm run build --workspace=@everton-dgn/polyhive-server
          npm run build --workspace=polyhive

      - name: Pack dry-run (sanity check)
        run: |
          npm pack --dry-run --workspace=@everton-dgn/polyhive-highlight
          npm pack --dry-run --workspace=@everton-dgn/polyhive-relay
          npm pack --dry-run --workspace=@everton-dgn/polyhive-server
          npm pack --dry-run --workspace=polyhive

      - name: Publish to npm (idempotent)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")

          publish_workspace() {
            local workspace="$1"
            local current
            if current=$(npm view "$workspace@$VERSION" version 2>/dev/null) && [[ -n "$current" ]]; then
              echo "✓ $workspace@$VERSION already on npm; skipping."
              return 0
            fi

            echo "→ Publishing $workspace@$VERSION"
            local out
            if ! out=$(npm publish --workspace="$workspace" --access public --provenance 2>&1); then
              echo "$out"
              if echo "$out" | grep -qE 'EPUBLISHCONFLICT|cannot publish over the previously published versions|previously published version'; then
                echo "✓ $workspace@$VERSION raced to publish; treating conflict as success."
                return 0
              fi
              return 1
            fi
            echo "$out"
          }

          publish_workspace @everton-dgn/polyhive-highlight
          publish_workspace @everton-dgn/polyhive-relay
          publish_workspace @everton-dgn/polyhive-server
          publish_workspace @everton-dgn/polyhive-cli
