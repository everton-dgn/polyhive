name: NPM Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Stable tag to publish (e.g. v0.1.60)'
        required: true
        type: string

concurrency:
  group: npm-publish-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-15
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Verify tag is stable
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$RELEASE_TAG' is not a stable release tag. Beta tags do not publish to npm."
            exit 1
          fi

      - name: Verify package version matches tag
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${RELEASE_TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "::error::Tag version '$TAG_VERSION' does not match package.json version '$PKG_VERSION'."
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Build publishable packages
        run: |
          npm run build --workspace=polyhive-highlight
          npm run build --workspace=polyhive-relay
          npm run build --workspace=polyhive-server
          npm run build --workspace=polyhive

      - name: Pack dry-run (sanity check)
        run: |
          npm pack --dry-run --workspace=polyhive-highlight
          npm pack --dry-run --workspace=polyhive-relay
          npm pack --dry-run --workspace=polyhive-server
          npm pack --dry-run --workspace=polyhive

      - name: Publish polyhive-highlight
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace=polyhive-highlight --access public --provenance

      - name: Publish polyhive-relay
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace=polyhive-relay --access public --provenance

      - name: Publish polyhive-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace=polyhive-server --access public --provenance

      - name: Publish polyhive (CLI)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace=polyhive --access public --provenance
